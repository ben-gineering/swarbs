# Foot terminal configuration

[main]
font=JetBrains Mono 11
dpi-aware=no
initial-size=1200x800
pad=20x20 center
selection-target=clipboard

[colors]
alpha=0.95
background=1a1b26
foreground=a9b1d6
regular=16161e f7768e 9ece6a e0af68 7aa2f7 ad8ee8 7dcfff c0caf5
bright=414868 f7768e 9ece6a e0af68 7aa2f7 ad8ee8 7dcfff d5d6db
selection-foreground=1a1b26
selection-background=2f334d
cursor=c0caf5

[cursor]
style=beam
beam-thickness=2

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
label-foreground=1a1b26
label-background=7aa2f7
label-size=14.0
uri-escapes=*+=:.url

[hints]
font=JetBrains Mono 12
alphabet=1234567890
foreground=1a1b26
background=7aa2f7
padding=4

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
scrollback-up-line=Shift+Page_Up
scrollback-down-line=Shift+Page_Down
scrollback-to-beginning=Shift+Home
scrollback-to-end=Shift+End
copy-mode=Control+Shift+c
paste=Control+Shift+v
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
search-start=Control+Shift+f

[search-bindings]
cancel=Control+g Escape
find-prev=Control+r
find-next=Control+s Control+g
line-wrap=Control+w

[mute]
bell=none
